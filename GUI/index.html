<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çiçek Benzerliği Bulucu</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
    <h1>Çiçek Benzerliği Bulucu</h1>
    <p class="description">Yapay Zeka Destekli Görsel Arama</p>

    <div class="main-layout">
        
        <div class="left-panel">
            <h2><i class="fas fa-camera"></i> Görsel Yükleme</h2>
            
            <div class="upload-section">
                <label for="file-upload" class="upload-box">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <span>Bir görsel seçmek için tıklayın veya sürükleyin</span>
                    <input type="file" id="file-upload" accept="image/*" class="hidden-input">
                </label>
                <div id="file-name-display" class="file-name-display">Henüz dosya seçilmedi.</div>
            </div>

            <div class="preview-analysis-section">
                <div class="image-preview-container">
                    <img id="image-preview" src="#" alt="Önizleme" class="image-preview" style="display: none;">
                </div>
                <button id="analyze-button" class="analyze-button" disabled>
                    <i class="fas fa-search"></i> Benzer Çiçekleri Bul
                </button>
            </div>
            <h2><i class="fas fa-video"></i> Video Yükleme</h2>

<div class="upload-section">
    <label for="video-upload" class="upload-box">
        <i class="fas fa-cloud-upload-alt upload-icon"></i>
        <span>Bir video seçmek için tıklayın veya sürükleyin</span>
        <input type="file" id="video-upload" accept="video/*" class="hidden-input">
    </label>
    <div id="video-name-display" class="file-name-display">Henüz video seçilmedi.</div>
</div>

<button id="analyze-video-button" class="analyze-button" disabled>
    <i class="fas fa-search"></i> Videodaki Benzer Çiçekleri Bul
</button>
        </div> 
        
        <div class="right-panel">
            <h2><i class="fas fa-seedling"></i> En Benzer Sonuçlar</h2>
            <div id="results-gallery" class="results-gallery">
                <p>Henüz bir analiz yapılmadı. Sol panelden bir çiçek görseli yükleyin.</p>
            </div>
        </div>
        
    </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
